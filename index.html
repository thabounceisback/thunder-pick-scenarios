<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e1a">
<title>OKC Pick Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700;800&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–bg: #0a0e1a;
–surface: rgba(255,255,255,0.03);
–surface-hover: rgba(255,255,255,0.06);
–border: rgba(255,255,255,0.06);
–text: #f0f2f5;
–text-secondary: #8b92a5;
–text-muted: #555d73;
–okc-blue: #007ac1;
–okc-orange: #ef6100;
–green: #34d399;
–amber: #fbbf24;
–red: #f87171;
–slate: #475569;
}

html { background: var(–bg); }
body {
font-family: ‘Inter’, -apple-system, BlinkMacSystemFont, sans-serif;
color: var(–text);
-webkit-font-smoothing: antialiased;
min-height: 100dvh;
padding: 0 20px env(safe-area-inset-bottom);
max-width: 440px;
margin: 0 auto;
overflow-x: hidden;
}

.glow {
position: fixed; top: -120px; left: 50%; transform: translateX(-50%);
width: 360px; height: 360px;
background: radial-gradient(circle, rgba(0,122,193,0.12) 0%, rgba(239,97,0,0.06) 40%, transparent 70%);
pointer-events: none; z-index: 0;
}
.content { position: relative; z-index: 1; }

.header { padding: 48px 0 28px; text-align: center; }
.thunder-mark {
display: inline-flex; align-items: center; justify-content: center;
width: 44px; height: 44px; border-radius: 12px;
background: linear-gradient(135deg, var(–okc-blue), var(–okc-orange));
margin-bottom: 14px; font-size: 22px;
box-shadow: 0 4px 24px rgba(0,122,193,0.3);
}
.header h1 {
font-family: ‘JetBrains Mono’, monospace;
font-size: 15px; font-weight: 800; letter-spacing: 0.12em;
text-transform: uppercase; margin-bottom: 4px;
}
.header .sub { font-size: 12px; color: var(–text-muted); font-weight: 500; letter-spacing: 0.02em; }

.toggle {
display: flex; background: var(–surface); border: 1px solid var(–border);
border-radius: 12px; padding: 3px; margin-bottom: 24px;
}
.toggle button {
flex: 1; padding: 12px 6px; border: none; border-radius: 10px; cursor: pointer;
font-family: ‘Inter’, sans-serif; font-size: 13px; font-weight: 600;
color: var(–text-muted); background: transparent; transition: all 0.3s ease;
-webkit-tap-highlight-color: transparent;
}
.toggle button.on {
color: var(–text); background: var(–surface-hover);
box-shadow: 0 1px 8px rgba(0,0,0,0.2);
}

.scenario-badge { text-align: center; margin-bottom: 22px; min-height: 26px; }
.scenario-badge span {
display: inline-block; padding: 5px 14px; border-radius: 100px;
font-size: 11px; font-weight: 700; letter-spacing: 0.03em; text-transform: uppercase;
}
.badge-default { background: rgba(139,146,165,0.1); color: var(–text-secondary); }
.badge-scenario { background: rgba(251,191,36,0.1); color: var(–amber); }

.key-strip { display: flex; gap: 8px; margin-bottom: 24px; }
.key-num {
flex: 1; text-align: center; padding: 14px 6px; border-radius: 12px;
border: 1px solid var(–border); background: var(–surface);
}
.key-num .val {
font-family: ‘JetBrains Mono’, monospace; font-size: 22px; font-weight: 800;
letter-spacing: -0.03em; display: block; margin-bottom: 3px;
}
.key-num .lbl {
font-size: 10px; font-weight: 600; color: var(–text-muted);
text-transform: uppercase; letter-spacing: 0.06em; line-height: 1.3;
}

.card {
background: var(–surface); border: 1px solid var(–border);
border-radius: 16px; padding: 20px; margin-bottom: 14px;
opacity: 0; transform: translateY(12px);
animation: cardIn 0.5s ease forwards;
}
.card:nth-child(2) { animation-delay: 0.1s; }
@keyframes cardIn { to { opacity: 1; transform: translateY(0); } }

.card-top {
display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px;
}
.card-team { display: flex; align-items: center; gap: 10px; }
.team-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
.dot-lac { background: #c8102e; box-shadow: 0 0 8px rgba(200,16,46,0.4); }
.dot-phi { background: #006bb6; box-shadow: 0 0 8px rgba(0,107,182,0.4); }
.card-team span { font-size: 14px; font-weight: 700; letter-spacing: -0.01em; }
.card-team small {
font-size: 11px; color: var(–text-muted); font-weight: 600;
margin-left: 6px; letter-spacing: 0.04em; text-transform: uppercase;
}
.card-slot {
font-family: ‘JetBrains Mono’, monospace; font-size: 11px; font-weight: 700;
color: var(–text-muted); background: rgba(255,255,255,0.04);
padding: 3px 8px; border-radius: 6px; letter-spacing: 0.02em;
}

.stacked-bar {
display: flex; height: 10px; border-radius: 5px; overflow: hidden;
margin-bottom: 20px; background: rgba(255,255,255,0.03); gap: 2px;
}
.stacked-bar .seg { height: 100%; border-radius: 3px; transition: width 0.9s cubic-bezier(.4,0,.15,1); width: 0; }
.seg-green { background: var(–green); }
.seg-amber { background: var(–amber); }
.seg-red   { background: var(–red); }
.seg-slate { background: var(–slate); }

.outcomes { display: flex; flex-direction: column; gap: 10px; }
.outcome-row {
display: flex; align-items: center; gap: 10px;
padding: 10px 12px; border-radius: 10px;
background: rgba(255,255,255,0.015); border: 1px solid transparent;
transition: border-color 0.2s;
}
.outcome-color { width: 4px; height: 28px; border-radius: 2px; flex-shrink: 0; }
.oc-green { background: var(–green); }
.oc-amber { background: var(–amber); }
.oc-red   { background: var(–red); }
.oc-slate { background: var(–slate); }

.outcome-info { flex: 1; min-width: 0; }
.outcome-label { font-size: 13px; font-weight: 600; letter-spacing: -0.01em; line-height: 1.3; }
.outcome-desc { font-size: 11px; color: var(–text-muted); margin-top: 1px; line-height: 1.3; }

.outcome-pct {
font-family: ‘JetBrains Mono’, monospace; font-size: 18px; font-weight: 800;
letter-spacing: -0.03em; text-align: right; flex-shrink: 0; min-width: 60px;
}
.pct-green { color: var(–green); }
.pct-amber { color: var(–amber); }
.pct-red   { color: var(–red); }
.pct-slate { color: var(–slate); }

.footer {
text-align: center; padding: 22px 0 36px;
font-size: 11px; color: var(–text-muted); line-height: 1.6;
}
.footer strong { color: var(–text-secondary); font-weight: 600; }
</style>

</head>
<body>

<div class="glow"></div>
<div class="content">

<div class="header">
  <div class="thunder-mark">⚡</div>
  <h1>OKC Pick Tracker</h1>
  <p class="sub">Market-implied odds · April 2025 Play-In</p>
</div>

<div class="toggle">
  <button class="on" id="t-now" onclick="go('now')">Right Now</button>
  <button id="t-if" onclick="go('if')">If GSW + ORL Win</button>
</div>

<div class="scenario-badge" id="badge"></div>
<div class="key-strip" id="keys"></div>
<div id="cards"></div>
<div class="footer" id="foot"></div>

</div>

<script>
var D = {
  now: {
    badge: '<span class="badge-default">Unconditional · All Outcomes</span>',
    keys: [
      { val: "68%", lbl: "LAC pick<br>becomes lottery", color: "var(--green)" },
      { val: "25%", lbl: "PHI pick<br>conveys to OKC", color: "var(--green)" },
      { val: "4.8%", lbl: "LAC pick<br>lands top 4", color: "var(--amber)" }
    ],
    foot: "Probabilities derived from no-vig play-in lines and Tankathon lottery slots. LAC pick unprotected. PHI pick top-4 protected (2026).",
    cards: [
      {
        team: "Clippers", code: "LAC", dotClass: "dot-lac", slot: "Slot #12",
        segs: [ {p:4.8,c:"seg-amber"}, {p:63.2,c:"seg-green"}, {p:32.0,c:"seg-slate"} ],
        rows: [
          { label:"Lottery → OKC", desc:"Clippers miss playoffs, pick 5–14", pct:"63.2%", oc:"oc-green", pc:"pct-green" },
          { label:"Playoff Pick", desc:"Clippers make playoffs", pct:"32.0%", oc:"oc-slate", pc:"pct-slate" },
          { label:"Top 4 Lottery", desc:"1.0% chance at No. 1 overall", pct:"4.8%", oc:"oc-amber", pc:"pct-amber" }
        ]
      },
      {
        team: "76ers", code: "PHI", dotClass: "dot-phi", slot: "Slot #14",
        segs: [ {p:25.2,c:"seg-green"}, {p:0.6,c:"seg-red"}, {p:74.2,c:"seg-slate"} ],
        rows: [
          { label:"Lottery → OKC", desc:"Philly misses, pick lands 5–14", pct:"25.2%", oc:"oc-green", pc:"pct-green" },
          { label:"Playoff Pick", desc:"76ers make playoffs", pct:"74.2%", oc:"oc-slate", pc:"pct-slate" },
          { label:"Philly Keeps", desc:"Misses but jumps to top 4", pct:"0.6%", oc:"oc-red", pc:"pct-red" }
        ]
      }
    ]
  },
  "if": {
    badge: '<span class="badge-scenario">Scenario · 18.7% Combo Probability</span>',
    keys: [
      { val: "100%", lbl: "LAC pick<br>becomes lottery", color: "var(--green)" },
      { val: "52%", lbl: "PHI pick<br>conveys to OKC", color: "var(--green)" },
      { val: "7.1%", lbl: "LAC pick<br>lands top 4", color: "var(--amber)" }
    ],
    foot: "<strong>Scenario:</strong> Warriors beat Clippers (9v10) and Magic beat 76ers (7v8). Combo: 38.7% × 48.3% = 18.7%. Philly still has one play-in game remaining.",
    cards: [
      {
        team: "Clippers", code: "LAC", dotClass: "dot-lac", slot: "Eliminated",
        segs: [ {p:7.1,c:"seg-amber"}, {p:92.9,c:"seg-green"} ],
        rows: [
          { label:"Lottery → OKC", desc:"Clippers eliminated, pick 5–14", pct:"92.9%", oc:"oc-green", pc:"pct-green" },
          { label:"Top 4 Lottery", desc:"1.5% chance at No. 1 overall", pct:"7.1%", oc:"oc-amber", pc:"pct-amber" }
        ]
      },
      {
        team: "76ers", code: "PHI", dotClass: "dot-phi", slot: "Must-Win Game",
        segs: [ {p:52.2,c:"seg-green"}, {p:1.3,c:"seg-red"}, {p:46.5,c:"seg-slate"} ],
        rows: [
          { label:"Lottery → OKC", desc:"Philly loses again, pick lands 5–14", pct:"52.2%", oc:"oc-green", pc:"pct-green" },
          { label:"Playoff Pick", desc:"Philly wins final play-in", pct:"46.5%", oc:"oc-slate", pc:"pct-slate" },
          { label:"Philly Keeps", desc:"Misses but jumps to top 4", pct:"1.3%", oc:"oc-red", pc:"pct-red" }
        ]
      }
    ]
  }
};

var cur = "now";

function go(k) {
  cur = k;
  document.getElementById("t-now").className = k === "now" ? "on" : "";
  document.getElementById("t-if").className = k === "if" ? "on" : "";
  render();
}

function render() {
  var d = D[cur];
  document.getElementById("badge").innerHTML = d.badge;
  document.getElementById("foot").innerHTML = d.foot;

  document.getElementById("keys").innerHTML = d.keys.map(function(k) {
    return '<div class="key-num"><span class="val" style="color:'+k.color+'">'+k.val+'</span><span class="lbl">'+k.lbl+'</span></div>';
  }).join("");

  document.getElementById("cards").innerHTML = d.cards.map(function(c) {
    var segsHtml = c.segs.map(function(s) {
      return '<div class="seg '+s.c+'" data-w="'+s.p+'"></div>';
    }).join("");
    var rowsHtml = c.rows.map(function(r) {
      return '<div class="outcome-row"><div class="outcome-color '+r.oc+'"></div><div class="outcome-info"><div class="outcome-label">'+r.label+'</div><div class="outcome-desc">'+r.desc+'</div></div><div class="outcome-pct '+r.pc+'">'+r.pct+'</div></div>';
    }).join("");
    return '<div class="card"><div class="card-top"><div class="card-team"><div class="team-dot '+c.dotClass+'"></div><span>'+c.team+'</span><small>'+c.code+'</small></div><div class="card-slot">'+c.slot+'</div></div><div class="stacked-bar">'+segsHtml+'</div><div class="outcomes">'+rowsHtml+'</div></div>';
  }).join("");

  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      var segs = document.querySelectorAll(".seg");
      for (var i = 0; i < segs.length; i++) {
        segs[i].style.width = segs[i].getAttribute("data-w") + "%";
      }
    });
  });
}

render();
</script>

</body>
</html>
