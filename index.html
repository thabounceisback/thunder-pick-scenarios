<!DOCTYPE html>

<html lang="en" style="background:#0a0e1a;color-scheme:dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e1a">
<title>OKC Pick Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
background-color: #0a0e1a !important;
color: #f0f2f5 !important;
color-scheme: dark;
}

body {
font-family: ‘Inter’, -apple-system, BlinkMacSystemFont, sans-serif;
-webkit-font-smoothing: antialiased;
-moz-osx-font-smoothing: grayscale;
min-height: 100dvh;
padding: 0 20px env(safe-area-inset-bottom);
max-width: 440px;
margin: 0 auto;
overflow-x: hidden;
}

/* Ambient glow */
.glow {
position: fixed; top: -140px; left: 50%; transform: translateX(-50%);
width: 400px; height: 400px;
background: radial-gradient(circle, rgba(0,122,193,0.15) 0%, rgba(239,97,0,0.07) 45%, transparent 70%);
pointer-events: none; z-index: 0;
}
.wrap { position: relative; z-index: 1; }

/* ─── Header ─── */
.hdr { padding: 44px 0 24px; text-align: center; }
.mark {
display: inline-flex; align-items: center; justify-content: center;
width: 48px; height: 48px; border-radius: 14px;
background: linear-gradient(135deg, #007ac1 0%, #ef6100 100%);
margin-bottom: 14px; font-size: 24px;
box-shadow: 0 6px 32px rgba(0,122,193,0.35), 0 2px 8px rgba(239,97,0,0.2);
}
.hdr h1 {
font-family: ‘JetBrains Mono’, monospace;
font-size: 16px; font-weight: 800; letter-spacing: 0.14em;
text-transform: uppercase; color: #f0f2f5; margin-bottom: 5px;
}
.hdr .sub {
font-size: 12px; color: #555d73; font-weight: 500; letter-spacing: 0.02em;
}

/* ─── Toggle ─── */
.tog {
display: flex;
background: rgba(255,255,255,0.04);
border: 1px solid rgba(255,255,255,0.07);
border-radius: 14px; padding: 4px; margin-bottom: 20px;
}
.tog button {
flex: 1; padding: 13px 8px; border: none; border-radius: 11px; cursor: pointer;
font-family: ‘Inter’, sans-serif; font-size: 13px; font-weight: 600;
color: #555d73; background: transparent;
transition: all 0.3s cubic-bezier(.4,0,.2,1);
-webkit-tap-highlight-color: transparent;
}
.tog button.on {
color: #f0f2f5;
background: rgba(255,255,255,0.08);
box-shadow: 0 2px 12px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.05);
}

/* ─── Badge ─── */
.bdg { text-align: center; margin-bottom: 20px; min-height: 28px; }
.bdg span {
display: inline-block; padding: 6px 16px; border-radius: 100px;
font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
}
.bdg-d { background: rgba(139,146,165,0.08); color: #8b92a5; }
.bdg-s { background: rgba(251,191,36,0.1); color: #fbbf24; }

/* ─── Key Stats ─── */
.ks { display: flex; gap: 8px; margin-bottom: 22px; }
.kn {
flex: 1; text-align: center; padding: 16px 4px 14px;
border-radius: 14px;
background: rgba(255,255,255,0.03);
border: 1px solid rgba(255,255,255,0.06);
}
.kn .v {
font-family: ‘JetBrains Mono’, monospace;
font-size: 24px; font-weight: 800; letter-spacing: -0.04em;
display: block; margin-bottom: 4px; line-height: 1;
}
.kn .l {
font-size: 9px; font-weight: 700; color: #555d73;
text-transform: uppercase; letter-spacing: 0.07em; line-height: 1.35;
}

/* ─── Cards ─── */
.cd {
background: rgba(255,255,255,0.025);
border: 1px solid rgba(255,255,255,0.06);
border-radius: 18px; padding: 20px; margin-bottom: 14px;
opacity: 0; transform: translateY(14px);
animation: up 0.5s ease forwards;
}
.cd + .cd { animation-delay: 0.12s; }
@keyframes up { to { opacity: 1; transform: translateY(0); } }

.ct {
display: flex; align-items: center; justify-content: space-between;
margin-bottom: 16px;
}
.ctm { display: flex; align-items: center; gap: 10px; }
.td {
width: 11px; height: 11px; border-radius: 3px; flex-shrink: 0;
}
.td-l { background: #c8102e; box-shadow: 0 0 10px rgba(200,16,46,0.5); }
.td-p { background: #006bb6; box-shadow: 0 0 10px rgba(0,107,182,0.5); }
.ctm b { font-size: 15px; font-weight: 700; color: #f0f2f5; letter-spacing: -0.01em; }
.ctm em {
font-style: normal; font-size: 11px; color: #555d73; font-weight: 600;
margin-left: 4px; letter-spacing: 0.05em; text-transform: uppercase;
}
.sl {
font-family: ‘JetBrains Mono’, monospace; font-size: 10px; font-weight: 700;
color: #555d73; background: rgba(255,255,255,0.04);
padding: 4px 10px; border-radius: 8px; letter-spacing: 0.03em;
}

/* ─── Stacked bar ─── */
.sb {
display: flex; height: 8px; border-radius: 4px; overflow: hidden;
margin-bottom: 18px; background: rgba(255,255,255,0.03); gap: 2px;
}
.sb i {
display: block; height: 100%; border-radius: 3px; font-style: normal;
transition: width 1s cubic-bezier(.25,.8,.25,1); width: 0;
}
.sg { background: #34d399; }
.sa { background: #fbbf24; }
.sr { background: #f87171; }
.ss { background: #475569; }

/* ─── Rows ─── */
.os { display: flex; flex-direction: column; gap: 6px; }
.or {
display: flex; align-items: center; gap: 12px;
padding: 12px 14px; border-radius: 12px;
background: rgba(255,255,255,0.02);
border: 1px solid rgba(255,255,255,0.03);
}
.oc { width: 3px; height: 32px; border-radius: 2px; flex-shrink: 0; }
.cg { background: #34d399; }
.ca { background: #fbbf24; }
.cr { background: #f87171; }
.cs { background: #475569; }
.oi { flex: 1; min-width: 0; }
.ol { font-size: 13px; font-weight: 700; color: #f0f2f5; line-height: 1.3; letter-spacing: -0.01em; }
.od { font-size: 11px; color: #555d73; margin-top: 2px; line-height: 1.3; font-weight: 500; }
.op {
font-family: ‘JetBrains Mono’, monospace; font-size: 20px; font-weight: 800;
letter-spacing: -0.04em; text-align: right; flex-shrink: 0; min-width: 64px;
}
.pg { color: #34d399; }
.pa { color: #fbbf24; }
.pr { color: #f87171; }
.ps { color: #64748b; }

/* ─── Footer ─── */
.ft {
text-align: center; padding: 20px 8px 40px;
font-size: 11px; color: #555d73; line-height: 1.65;
}
.ft strong { color: #8b92a5; font-weight: 600; }
</style>

</head>
<body style="background-color:#0a0e1a;color:#f0f2f5">

<div class="glow"></div>
<div class="wrap">

<div class="hdr">
  <div class="mark">⚡</div>
  <h1>OKC Pick Tracker</h1>
  <p class="sub">Market-implied odds · April 2025 Play-In</p>
</div>

<div class="tog">
  <button class="on" id="b0" onclick="go('now')">Right Now</button>
  <button id="b1" onclick="go('if')">If GSW + ORL Win</button>
</div>

<div class="bdg" id="bdg"></div>
<div class="ks" id="ks"></div>
<div id="cds"></div>
<div class="ft" id="ft"></div>

</div>

<script>
var D = {
  now: {
    bdg: '<span class="bdg-d">Unconditional · All Outcomes</span>',
    keys: [
      { v:"68%", l:"LAC PICK<br>BECOMES LOTTERY", c:"#34d399" },
      { v:"25%", l:"PHI PICK<br>CONVEYS TO OKC", c:"#34d399" },
      { v:"4.8%", l:"LAC PICK<br>LANDS TOP 4", c:"#fbbf24" }
    ],
    ft: "Derived from no-vig play-in lines & Tankathon lottery slots.<br>LAC pick unprotected. PHI pick top-4 protected (2026).",
    cards: [
      { tm:"Clippers", cd:"LAC", dc:"td-l", sl:"Slot #12",
        sg:[{p:4.8,c:"sa"},{p:63.2,c:"sg"},{p:32,c:"ss"}],
        rw:[
          {lb:"Lottery → OKC",ds:"Clippers miss playoffs, pick 5–14",pc:"63.2%",oc:"cg",xc:"pg"},
          {lb:"Playoff Pick",ds:"Clippers make playoffs",pc:"32.0%",oc:"cs",xc:"ps"},
          {lb:"Top 4 Lottery",ds:"1.0% chance at No. 1 overall",pc:"4.8%",oc:"ca",xc:"pa"}
        ]},
      { tm:"76ers", cd:"PHI", dc:"td-p", sl:"Slot #14",
        sg:[{p:25.2,c:"sg"},{p:0.6,c:"sr"},{p:74.2,c:"ss"}],
        rw:[
          {lb:"Lottery → OKC",ds:"Philly misses, pick lands 5–14",pc:"25.2%",oc:"cg",xc:"pg"},
          {lb:"Playoff Pick",ds:"76ers make playoffs",pc:"74.2%",oc:"cs",xc:"ps"},
          {lb:"Philly Keeps",ds:"Misses but jumps to top 4",pc:"0.6%",oc:"cr",xc:"pr"}
        ]}
    ]
  },
  "if": {
    bdg: '<span class="bdg-s">Scenario · 18.7% Combo Probability</span>',
    keys: [
      { v:"100%", l:"LAC PICK<br>BECOMES LOTTERY", c:"#34d399" },
      { v:"52%", l:"PHI PICK<br>CONVEYS TO OKC", c:"#34d399" },
      { v:"7.1%", l:"LAC PICK<br>LANDS TOP 4", c:"#fbbf24" }
    ],
    ft: "<strong>Scenario:</strong> Warriors beat Clippers (9v10) + Magic beat 76ers (7v8).<br>Combo: 38.7% × 48.3% = 18.7%. Philly still has one play-in game left.",
    cards: [
      { tm:"Clippers", cd:"LAC", dc:"td-l", sl:"Eliminated",
        sg:[{p:7.1,c:"sa"},{p:92.9,c:"sg"}],
        rw:[
          {lb:"Lottery → OKC",ds:"Clippers eliminated, pick 5–14",pc:"92.9%",oc:"cg",xc:"pg"},
          {lb:"Top 4 Lottery",ds:"1.5% chance at No. 1 overall",pc:"7.1%",oc:"ca",xc:"pa"}
        ]},
      { tm:"76ers", cd:"PHI", dc:"td-p", sl:"Must-Win Game",
        sg:[{p:52.2,c:"sg"},{p:1.3,c:"sr"},{p:46.5,c:"ss"}],
        rw:[
          {lb:"Lottery → OKC",ds:"Philly loses again, pick lands 5–14",pc:"52.2%",oc:"cg",xc:"pg"},
          {lb:"Playoff Pick",ds:"Philly wins final play-in",pc:"46.5%",oc:"cs",xc:"ps"},
          {lb:"Philly Keeps",ds:"Misses but jumps to top 4",pc:"1.3%",oc:"cr",xc:"pr"}
        ]}
    ]
  }
};

var cur = "now";

function go(k) {
  cur = k;
  document.getElementById("b0").className = k==="now"?"on":"";
  document.getElementById("b1").className = k==="if"?"on":"";
  render();
}

function render() {
  var d = D[cur];
  document.getElementById("bdg").innerHTML = d.bdg;
  document.getElementById("ft").innerHTML = d.ft;

  var kh = "";
  for (var i=0; i<d.keys.length; i++) {
    var k = d.keys[i];
    kh += '<div class="kn"><span class="v" style="color:'+k.c+'">'+k.v+'</span><span class="l">'+k.l+'</span></div>';
  }
  document.getElementById("ks").innerHTML = kh;

  var ch = "";
  for (var i=0; i<d.cards.length; i++) {
    var c = d.cards[i];
    var sh = "";
    for (var j=0; j<c.sg.length; j++) {
      sh += '<i class="'+c.sg[j].c+'" data-w="'+c.sg[j].p+'"></i>';
    }
    var rh = "";
    for (var j=0; j<c.rw.length; j++) {
      var r = c.rw[j];
      rh += '<div class="or"><div class="oc '+r.oc+'"></div><div class="oi"><div class="ol">'+r.lb+'</div><div class="od">'+r.ds+'</div></div><div class="op '+r.xc+'">'+r.pc+'</div></div>';
    }
    ch += '<div class="cd"><div class="ct"><div class="ctm"><div class="td '+c.dc+'"></div><b>'+c.tm+'</b><em>'+c.cd+'</em></div><div class="sl">'+c.sl+'</div></div><div class="sb">'+sh+'</div><div class="os">'+rh+'</div></div>';
  }
  document.getElementById("cds").innerHTML = ch;

  requestAnimationFrame(function(){requestAnimationFrame(function(){
    var els = document.querySelectorAll(".sb i");
    for (var i=0; i<els.length; i++) {
      els[i].style.width = els[i].getAttribute("data-w")+"%";
    }
  })});
}

render();
</script>

</body>
</html>
